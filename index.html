<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App BB Dog</title>

<style>
body { font-family: Arial; margin: 10px; background: #f5f7fa; }
h1 { color: #1e3a8a; font-size: 22px; }

select, input, textarea {
    padding: 12px;
    font-size: 16px;
    width: 100%;
    margin-bottom: 12px;
    box-sizing: border-box;
}

.item { display: flex; flex-direction: column; margin: 6px 0; padding: 6px; border-radius: 6px; }
.linha-par { background: #f1f3f5; }

.item-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.desc { flex: 1; font-size: 14px; }

.controls { display: flex; align-items: center; gap: 5px; }
.controls button { width: 38px; height: 38px; border: none; color: white; font-size: 18px; }

.btn-minus { background: red; }
.btn-plus { background: blue; }

.categoria { margin-top: 20px; font-weight: bold; color: #1e3a8a; font-size: 18px; }

.acoes { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }

.btn-enviar, .btn-limpar {
    padding: 15px;
    font-size: 16px;
    width: 100%;
    border: none;
}

.btn-limpar { background: #555; color: white; }

.logo {
    position: fixed;
    bottom: 10px;
    right: 10px;
    width: 60px;
    opacity: 0.8;
}
</style>
</head>

<body>

<h1>Pedido BB Dog</h1>

<select id="loja"></select>
<input type="text" id="busca" placeholder="Buscar produto...">
<textarea id="extra" placeholder="Se faltou algum produto que você não encontrou na lista digite aqui"></textarea>

<select id="prazo">
<option value="">Selecione o prazo de entrega</option>
<option value="URGENTE, PRA HOJE">URGENTE, PRA HOJE</option>
<option value="TA TRANQUILO, HOJE OU AMANHA">TA TRANQUILO, HOJE OU AMANHA</option>
</select>

<div id="produtos"></div>

<div class="acoes">
<button class="btn-enviar" onclick="confirmarEnvio()">Enviar Pedido</button>
<button class="btn-limpar" onclick="limparTela()">Limpar Tela</button>
</div>

<img src="logo.png" class="logo">

<script>
let produtos = [];
let lojas = [];
let quantidades = {};

async function carregarDados(){
    produtos = await fetch("produtos.json").then(r=>r.json());
    lojas = await fetch("lojas.json").then(r=>r.json());

    const select = document.getElementById("loja");
    select.innerHTML = "<option value=''>Selecione a loja</option>";

    lojas.forEach(l=>{
        select.innerHTML += `<option value="${l.codigo} - ${l.nome}">
        ${l.codigo} - ${l.nome}</option>`;
    });

    render();
}

function render(){
    const busca = document.getElementById("busca").value.toLowerCase();
    const div = document.getElementById("produtos");
    div.innerHTML = "";

    let catAtual = "";
    let index = 0;

    produtos.forEach(p=>{
        if(!p.descricao.toLowerCase().includes(busca)) return;

        if(p.categoria !== catAtual){
            catAtual = p.categoria;
            div.innerHTML += `<div class="categoria">${p.categoria}</div>`;
        }

        const qtd = quantidades[p.codigo] || 0;
        const classe = (index % 2 === 0) ? "item linha-par" : "item";

        div.innerHTML += `
        <div class="${classe}">
            <div class="item-top">
                <div class="desc">${p.codigo} - ${p.descricao}</div>
                <div class="controls">
                    <button class="btn-minus" onclick="menos('${p.codigo}')">-</button>
                    ${qtd}
                    <button class="btn-plus" onclick="mais('${p.codigo}')">+</button>
                </div>
            </div>
        </div>`;

        index++;
    });
}

function mais(c){ quantidades[c]=(quantidades[c]||0)+1; render(); }
function menos(c){ if(quantidades[c]>0){quantidades[c]--; render();}}

function limparTela(){
    if(confirm("Deseja limpar todo o pedido?")){
        quantidades = {};
        document.getElementById("extra").value = "";
        document.getElementById("prazo").value = "";
        render();
    }
}

function gerarNumero(){
    const d=new Date();
    return "BB"+
    String(d.getDate()).padStart(2,'0')+
    String(d.getMonth()+1).padStart(2,'0')+
    String(d.getFullYear()).slice(2)+"-"+
    String(d.getHours()).padStart(2,'0')+
    String(d.getMinutes()).padStart(2,'0');
}

function montarMensagem(){
    const loja = document.getElementById("loja").value;
    const extra = document.getElementById("extra").value.trim();
    const prazo = document.getElementById("prazo").value;

    const d=new Date();
    const dias=["Domingo","Segunda-feira","Terça-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sábado"];

    let totalItens = 0;

    let msg=`*PEDIDO Nº:* ${gerarNumero()}\n`;
    msg+=`*Data:* ${d.toLocaleDateString()} (${dias[d.getDay()]})\n`;
    msg+=`*Hora:* ${d.toLocaleTimeString().slice(0,5)}\n\n`;
    msg+=`*Loja:* ${loja}\n`;

    if(prazo){
        msg+=`\n*Prazo de Entrega:* ${prazo}\n`;
    }

    msg+=`\n*ITENS:*\n`;

    produtos.forEach(p=>{
        if(quantidades[p.codigo]>0){
            totalItens++;
            msg+=`${p.codigo} - ${p.descricao} = ${quantidades[p.codigo]} ${p.embalagem}\n`;
        }
    });

    if(extra){
        msg+=`\n*ITENS NÃO ENCONTRADOS:*\n${extra}\n`;
    }

    msg+=`\n----------------------------\n*TOTAL DE ITENS:* ${totalItens}\n\nPedido gerado via App BB Dog`;
    return msg;
}

function confirmarEnvio(){
    if(!document.getElementById("loja").value){
        alert("Selecione a loja");
        return;
    }

    const msg = montarMensagem();

    if(confirm("Enviar pedido?")){
        window.open("https://wa.me/5515997094000?text="+encodeURIComponent(msg));
    }
}

document.getElementById("busca").addEventListener("input", render);
carregarDados();
</script>

</body>
</html>
